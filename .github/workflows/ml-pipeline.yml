# .github/workflows/ml-pipeline.yml
name: ML Model CI

on:
  push:
      branches: [main]
  pull_request:

jobs:
    validate-and-test:
      runs-on: ubuntu-latest
      steps:                
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Linter Check
        uses : super-linter/super-linter@v7.1.0
      
      - name: Model Dry Test
        run: |
            python -c "import torch; print('Model environment ready!')"
