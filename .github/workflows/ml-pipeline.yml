name : ML-Model-CLI

on : 
  push : 
    branches : [main]
  pull_request : 
    branches : [main]
  
jobs : 
  validate-and-test : 
    runs-on : ubuntu-latest
    steps : 
      - name : Set up Python
      - uses : actions/setup-python@5
      - with : 
        python-version : '3.10'
      - name : Intsall Dependinces 
      - run : pip install -r requirements.txt
      - name : Linter Checker 
      - uses : actions/Super-Litner-Check
      - name : Model Dry TEst 
      - run : | 
        python - c "import torch; print('Model Environment Ready')"